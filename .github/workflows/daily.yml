name: HHG Agent Test

on:

  workflow_dispatch:


jobs:

  test:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"


    - name: Run Test

      env:

        SMTP_PASSWORD:
          ${{ secrets.SMTP_PASSWORD }}

      run:

        python main.py
