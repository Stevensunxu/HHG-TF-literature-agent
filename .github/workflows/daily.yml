name: Strong Field Literature Report


on:

  workflow_dispatch:


  schedule:

    - cron: "0 15 * * 0"



jobs:


  report:


    runs-on: ubuntu-latest


    steps:


    - uses: actions/checkout@v4


    - uses: actions/setup-python@v5

      with:

        python-version: "3.11"



    - name: Install

      run:

        pip install -r requirements.txt



    - name: Run

      env:

        SMTP_PASSWORD:
          ${{ secrets.SMTP_PASSWORD }}


        DEEPSEEK_API_KEY:
          ${{ secrets.DEEPSEEK_API_KEY }}


      run:

        python main.py
