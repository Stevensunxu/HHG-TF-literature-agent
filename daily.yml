name: HHG Literature Daily

on:

  schedule:
    - cron: "0 15 * * *"

  workflow_dispatch:


jobs:

  literature:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Python setup
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"


    - name: Install
      run:

        pip install -r requirements.txt


    - name: Run Agent

      env:

        SMTP_PASSWORD:
          ${{ secrets.SMTP_PASSWORD }}

      run:

        python main.py
